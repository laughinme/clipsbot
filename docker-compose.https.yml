services:
  backend:
    environment:
      SITE_URL: "https://localhost"
      WEBAPP_URL: "https://localhost/admin"
      STORAGE_ENDPOINT_PUBLIC: "https://localhost"
      COOKIE_SECURE: "true"
      COOKIE_SAMESITE: "lax"

  bot:
    environment:
      WEBAPP_URL: "https://localhost/admin"

  nginx:
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.https.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs/fullchain.pem:/etc/nginx/certs/fullchain.pem:ro
      - ./nginx/certs/privkey.pem:/etc/nginx/certs/privkey.pem:ro
